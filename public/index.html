*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'JetBrains Mono',monospace;cursor:crosshair;touch-action:none}
.scene{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;transform-style:preserve-3d}
.pivot{position:absolute;top:50%;left:50%;transform-style:preserve-3d;will-change:transform}
.layer{position:absolute;top:0;left:0;transform-style:preserve-3d;will-change:transform;overflow:hidden}
.layer canvas{display:block}

/* ─── UI Overlay ─── */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none}

.clk{position:absolute;top:20px;right:24px;display:flex;gap:20px;font-size:9px;letter-spacing:2.5px;opacity:0.4;font-weight:400;flex-wrap:wrap;justify-content:flex-end}
.clk span.t{font-variant-numeric:tabular-nums}


.br{position:absolute;bottom:36px;right:24px;text-align:right}
.bn{font-size:11px;letter-spacing:6px;opacity:0.75;margin-bottom:8px}
.bl{font-size:8px;letter-spacing:1.5px;opacity:0.28;line-height:2.2}

/* ─── Vignette ─── */
.vig{position:fixed;top:0;left:0;width:100%;height:100%;z-index:40;pointer-events:none;
  background:
    radial-gradient(ellipse at 25% 50%, transparent 20%, rgba(0,0,0,0.25) 55%, rgba(0,0,0,0.85) 100%),
    linear-gradient(90deg, transparent 45%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.97) 100%);
}

.cursor-light{position:fixed;width:400px;height:400px;border-radius:50%;pointer-events:none;z-index:35;
  background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);
  transform:translate(-50%,-50%);mix-blend-mode:screen;will-change:left,top}

.ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:36;
  border:1px solid rgba(255,255,255,0.15);mix-blend-mode:screen;will-change:transform,opacity}

/* ─── Tablet ─── */
@media(max-width:1024px){
  .clk{gap:14px;font-size:8px;letter-spacing:2px;top:16px;right:16px}
  .br{bottom:28px;right:16px}
  .bn{font-size:10px;letter-spacing:5px}
  .bl{font-size:7.5px}
}

/* ─── Mobile portrait ─── */
@media(max-width:680px){
  .clk{top:12px;right:12px;left:12px;justify-content:center;gap:10px;font-size:7px;letter-spacing:1.5px}
  .br{bottom:20px;right:auto;left:12px;right:12px;text-align:center}
  .bn{font-size:9px;letter-spacing:4px;margin-bottom:6px}
  .bl{font-size:7px;letter-spacing:1px}
  .vig{background:
    radial-gradient(ellipse at 50% 40%, transparent 15%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.9) 100%),
    linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0.97) 100%);
  }
  .cursor-light{display:none}
}

/* ─── Small mobile ─── */
@media(max-width:400px){
  .clk{font-size:6px;gap:8px}
  .bn{font-size:8px;letter-spacing:3px}
  .bl{font-size:6.5px}
}
</style>

<div class="scene" id="scene">

<div class="cursor-light" id="cl"></div>
<div class="ov">
  <div class="clk">

  </div>
  <div class="br">
    <div class="bn">[ X E N O S Y S T E M S ]</div>
    <div class="bl">HIRING: CAREERS@XENOSYSTEMS.XYZ<br>PUBLIC RELATIONS: PR@XENOSYSTEMS.XYZ</div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// XENOSYSTEMS — FULLY RESPONSIVE INTERACTIVE CASCADE
// ═══════════════════════════════════════════════════════════

!function(){const f=z=>new Date().toLocaleTimeString('en-GB',{timeZone:z,hour:'2-digit',minute:'2-digit',second:'2-digit'});
function u(){document.getElementById('ny').textContent=f('America/New_York');document.getElementById('hk').textContent=f('Asia/Hong_Kong');document.getElementById('ld').textContent=f('Europe/London');document.getElementById('tk').textContent=f('Asia/Tokyo')}u();setInterval(u,1000)}();

const W=window.innerWidth,H=window.innerHeight,DPR=Math.min(window.devicePixelRatio,2);
const scene=document.getElementById('scene'),pivot=document.getElementById('pivot'),cl=document.getElementById('cl');
const isMobile=W<680;
const isTablet=W>=680&&W<1024;
const isPortrait=H>W;

// ═══════════════════════════════════════════════
// RESPONSIVE SCALE FACTORS
// Everything scales relative to a 1920×1080 baseline
// ═══════════════════════════════════════════════
const baseW=1920,baseH=1080;
const scaleX=W/baseW;
const scaleY=H/baseH;
const scale=Math.min(scaleX,scaleY);
const scaleAvg=(scaleX+scaleY)/2;

// Perspective scales with width
scene.style.perspective=(1100*scaleAvg).toFixed(0)+'px';

// For portrait/mobile, shift the origin to center the cascade more
if(isPortrait){
  scene.style.perspectiveOrigin='50% 40%';
} else {
  scene.style.perspectiveOrigin='60% 48%';
}

// ═══════════════════════════════════════════════
// INTERACTION STATE
// ═══════════════════════════════════════════════
const mouse={x:0,y:0,sx:0,sy:0,px:W/2,py:H/2,vx:0,vy:0,prevX:W/2,prevY:H/2,
  down:false,dragStartX:0,dragStartY:0,dragRotX:0,dragRotY:0};
let zoomLevel=0,speedMultiplier=1,globalBurst=0;
let dragRotX=0,dragRotY=0,targetDragRotX=0,targetDragRotY=0;

const ripples=[];
function spawnRipple(x,y){
  for(let i=0;i<3;i++){
    const el=document.createElement('div');
    el.className='ripple';
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.width='0px';el.style.height='0px';
    document.body.appendChild(el);
    ripples.push({el,x,y,size:0,maxSize:(150+i*150)*scaleAvg,speed:(250+i*120)*scaleAvg,alpha:0.2-i*0.05,age:0});
  }
}

// ═══════════════════════════════════════════════
// DATA ENGINE
// ═══════════════════════════════════════════════
const HX='0123456789abcdef';
function rH(n){let s='';for(let i=0;i<n;i++)s+=HX[Math.random()*16|0];return s}
function rAmt(mx){return(Math.random()*(mx||999999)).toFixed(2)}
function rInt(mx){return Math.random()*(mx||999999)|0}
function ts(){const d=new Date(Date.now()-Math.random()*3600000);return d.toISOString().replace('T',' ').slice(0,19)+' UTC'}
const VALIDATORS=Array.from({length:8},()=>'VALIDATOR_'+rH(4));
const COMMODITIES=['CRUDE_WTI','BRENT','XAU','XAG','HG','NG','ZW','ZC','PL','NI','CT','CL','SI','PA','IRON_ORE','SOYBEAN'];

function genSegment(){
const p=[
()=>({t:`xenoBFT ROUND ${rInt(999999)} PROPOSER:${VALIDATORS[rInt(8)]} SLOTS:${2+rInt(6)} REFS:${rInt(40)+20}/${rInt(10)+30}`}),
()=>({t:`DAG BLK ${rH(8)} RND:${rInt(99999)} PARENT:[${rH(6)},${rH(6)},${rH(6)}] CERT:IMPLICIT DEPTH:${rInt(64)}`}),
()=>({t:`COMMIT 3δ PATTERN:CERTIFICATE ROUND_Δ:${rInt(3)+1} SUPPORT:${rInt(10)+21}f+1 LATENCY:${(Math.random()*400+80).toFixed(0)}ms`}),
()=>({t:`SKIP PATTERN DETECTED SLOT:${rInt(8)} RND:${rInt(99999)} NON_SUPPORT:${rInt(5)+21} ADVANCING`}),
()=>({t:`EPOCH ${rInt(9999)} CHANGE_BIT:SET FAST_PATH:PAUSED CONSENSUS:ACTIVE QUORUM_INTERSECT:VERIFIED`}),
()=>({t:`XVM EXEC SHARD:${rInt(16)} TX_BATCH:${rInt(500)+50} PARALLEL:${rInt(12)+4} CONFLICT:NONE`}),
()=>({t:`XVM BARE_METAL CORE:${rInt(64)} DPDK:ACTIVE VECTORED_IO:BATCH_${rInt(200)+50}`}),
()=>({t:`FAST_PATH TX:${rH(8)} TYPE:OWNED_TRANSFER CERT:EMBEDDED LATENCY:<100ms`}),
()=>({t:`CONSENSUS_PATH TX:${rH(8)} TYPE:SHARED_OBJ ORDERING:TOTAL FINALITY:3δ`}),
()=>({t:`MOVE::EXEC CONTRACT:${rH(8)} GAS:${(Math.random()*0.001).toFixed(8)} XENO`}),
()=>({t:`$XENO SUPPLY:${rAmt(999999999)} STAKED:${(40+Math.random()*30).toFixed(2)}% RF_RATE:${(3+Math.random()*4).toFixed(3)}%`}),
()=>({t:`$stXENO MINT DELEGATOR:${rH(8)} VALIDATOR:${VALIDATORS[rInt(8)]} AMT:${rAmt(100000)}`}),
()=>({t:`$stXENO/$XENO PAR:${(1+Math.random()*0.08).toFixed(6)} SPREAD:${(Math.random()*0.002).toFixed(6)}`}),
()=>({t:`STAKE ${rH(8)} → ${VALIDATORS[rInt(8)]} ${rAmt(500000)} XENO`}),
()=>({t:`EXCHANGE::CLOB ${COMMODITIES[rInt(16)]}/XENO BID:${rAmt(9999)} ASK:${rAmt(9999)} DEPTH:${rInt(50000)}`}),
()=>({t:`FILL ${rH(6)} ${COMMODITIES[rInt(16)]}/XENO ${rInt(10000)} LOTS @${rAmt(9999)}`}),
()=>({t:`ORACLE::ENSHRINE ${COMMODITIES[rInt(16)]}/XENO FEED:INTERNALIZED MANIPULATION:IMPOSSIBLE`}),
()=>({t:`LENDER::BORROW ${rH(8)} COLLAT:$stXENO LTV:${(80+Math.random()*15).toFixed(1)}% RATE:RF+${(Math.random()*3).toFixed(3)}%`}),
()=>({t:`CREDIT ISSUANCE ${rAmt(5000000)} XENO CEILING:${rAmt(99999999)} EXPANSION:ENDOGENOUS`}),
()=>({t:`DEALER::BALANCE_SHEET ${rAmt(99999999)} XENO CARRY:${(Math.random()*5).toFixed(3)}%`}),
()=>({t:`DEALER FILL ${['SPOT','PERP','DATED_FUT','BASIS'][rInt(4)]}::${COMMODITIES[rInt(16)]}/XENO SIZE:${rInt(10000)}`}),
()=>({t:`SPREAD BID_ASK:${(Math.random()*0.01).toFixed(6)} VOL_MONETIZE:${rAmt(10000)} YIELD→$stXENO`}),
()=>({t:`VOL_PRODUCT ${rH(6)} ${COMMODITIES[rInt(16)]}/XENO TYPE:${['OPTION','VAR_SWAP','STRADDLE'][rInt(3)]}`}),
()=>({t:`PAR_PRODUCT ${rH(6)} δ-NEUTRAL YIELD:${(Math.random()*12).toFixed(3)}% COUPON:XENO`}),
()=>({t:`ARB::${['CASH_BASIS','FUNDING_RATE','INTER_FUNC','LIQUIDATION','STAT_ARB'][rInt(5)]} PNL:${rAmt(50000)}`}),
()=>({t:`MONETARY_POLICY DEFICIT_FLOOR:<5% RF_YIELD:${(3+Math.random()*4).toFixed(4)}%`}),
()=>({t:`DEBT_CEILING ${rAmt(999999999)} UTIL:${(40+Math.random()*30).toFixed(1)}% QUORUM:SUPERMAJORITY`}),
()=>({t:`SOVEREIGN SPREAD ORACLE⇌TYRANT INSIDE:${(Math.random()*0.01).toFixed(6)} OUTSIDE:${(Math.random()*0.05).toFixed(6)}`}),
()=>({t:`DEALER_OF_ALL_RESORTS PAR_MAINT:ACTIVE CRISIS:PERPETUAL INTERNALIZATION:COMPLETE`}),
()=>({t:`BRIDGE::${['ETH','SOL','SUI','AVAX','APT','SEI','TIA'][rInt(7)]} LOCK:${rH(8)} PROOF:${rH(16)}`}),
()=>({t:`MERKLE:${rH(32)} STATE:${rH(32)}`}),
()=>({t:`0x${rH(64)}`}),
()=>({t:`XIP-${rInt(999)} ${['CEILING_ADJ','LTV_MOD','SLOT_RECONF','FEE_UPD'][rInt(4)]} ${['VOTING','PASSED','QUEUED'][rInt(3)]} Q:${rInt(30)+70}%`}),
()=>({t:`${ts()} BLK#${rInt(99999999).toString().padStart(8,'0')} TXS:${rInt(5000)+500}`}),
()=>({t:`[${['CONFIRMED','FINALIZED','COMMITTED','SETTLED','CLEARED'][rInt(5)]}] ${rH(8)} δ:${(Math.random()*300+50).toFixed(0)}ms`}),
()=>({t:`LIQUIDATION ${rH(6)} COLLAT:${rAmt(500000)} SHORTFALL:${rAmt(50000)}`}),
()=>({t:`WAL BATCH:${rInt(500)+100} VECTORED_IO BLK:[${rInt(999999)}-${rInt(999999)+1000}]`}),
];
return p[Math.random()*p.length|0]();}

function genRow(){const n=1+Math.random()*2|0;const a=[];for(let i=0;i<n;i++)a.push(genSegment());return a}

// ═══════════════════════════════════════════════
// RESPONSIVE LAYER DEFINITIONS
// Params scale with viewport. Fewer layers on mobile.
// ═══════════════════════════════════════════════

// Base definitions at 1920×1080
const BASE_LAYERS=[
  {fs:11.5,rows:100,cols:130,spd:38,op:0.95,z:180,x:-580,y:0,rY:-33,rX:3.5,rZ:1.0},
  {fs:11,  rows:110,cols:125,spd:30,op:0.82,z:70, x:-550,y:20,rY:-31,rX:2.8,rZ:0.6},
  {fs:10.5,rows:115,cols:120,spd:48,op:0.68,z:-50,x:-520,y:-12,rY:-29,rX:3.8,rZ:1.3},
  {fs:10,  rows:125,cols:125,spd:24,op:0.52,z:-190,x:-490,y:8,rY:-27,rX:2.5,rZ:0.8},
  {fs:9.5, rows:135,cols:130,spd:42,op:0.40,z:-330,x:-460,y:-6,rY:-25,rX:3.2,rZ:1.1},
  {fs:9,   rows:145,cols:135,spd:20,op:0.30,z:-470,x:-430,y:14,rY:-23,rX:2.2,rZ:0.5},
  {fs:9,   rows:145,cols:130,spd:36,op:0.23,z:-600,x:-400,y:-4,rY:-21,rX:2.8,rZ:0.9},
  {fs:8.5, rows:155,cols:140,spd:16,op:0.17,z:-740,x:-370,y:10,rY:-19,rX:2.0,rZ:0.4},
  {fs:8,   rows:165,cols:145,spd:30,op:0.12,z:-880,x:-345,y:-8,rY:-17,rX:2.5,rZ:0.7},
  {fs:7.5, rows:175,cols:150,spd:14,op:0.08,z:-1030,x:-320,y:6,rY:-15,rX:1.8,rZ:0.3},
  {fs:7,   rows:185,cols:155,spd:26,op:0.05,z:-1180,x:-295,y:-5,rY:-13,rX:2.2,rZ:0.6},
  {fs:6.5, rows:200,cols:160,spd:10,op:0.03,z:-1350,x:-270,y:3,rY:-11,rX:1.5,rZ:0.2},
];

// On mobile: fewer layers, smaller cols for perf
const layerCount=isMobile?6:isTablet?9:12;

const LDEFS=BASE_LAYERS.slice(0,layerCount).map(L=>({
  fs:   Math.max(6, L.fs*scaleAvg),
  rows: Math.max(40, Math.round(L.rows*(isMobile?0.4:isTablet?0.6:1))),
  cols: Math.max(30, Math.round(L.cols*scaleX*(isPortrait?0.7:1))),
  spd:  L.spd,
  op:   L.op,
  z:    L.z*scaleAvg,
  x:    isPortrait ? L.x*scaleAvg*0.6 : L.x*scaleX,
  y:    L.y*scaleY,
  rY:   isPortrait ? L.rY*0.5 : L.rY,
  rX:   L.rX,
  rZ:   L.rZ,
}));

const layers=[];

LDEFS.forEach((cfg,li)=>{
  const lineH=Math.ceil(cfg.fs*1.4);
  const charW=cfg.fs*0.605;
  const cW=Math.ceil(cfg.cols*charW)+24;
  const totalRows=cfg.rows*2;
  const cH=totalRows*lineH;

  const cv=document.createElement('canvas');
  cv.width=Math.ceil(cW*DPR);cv.height=Math.ceil(cH*DPR);
  cv.style.width=cW+'px';cv.style.height=cH+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(DPR,DPR);ctx.imageSmoothingEnabled=false;ctx.textBaseline='top';

  function renderRows(startR,endR,brightBoost){
    for(let r=startR;r<endR&&r<totalRows;r++){
      const y0=r*lineH;
      ctx.clearRect(0,y0,cW,lineH);
      const segs=genRow();

      const seed=Math.sin(r*127.1+li*311.7+r*r*0.001)*43758.5453;
      const rowBright=Math.abs(seed-Math.floor(seed));
      let baseAlpha;
      if(rowBright>0.87) baseAlpha=0.92;
      else if(rowBright>0.66) baseAlpha=0.55;
      else if(rowBright>0.40) baseAlpha=0.28;
      else if(rowBright>0.16) baseAlpha=0.11;
      else baseAlpha=0.035;
      if(r%(9+li*2)===0) baseAlpha=0.95;
      if(r%(7+li)===3) baseAlpha=Math.min(baseAlpha,0.06);
      if(brightBoost) baseAlpha=Math.min(baseAlpha+brightBoost,1.0);

      let xOff=8;
      ctx.font=`${cfg.fs}px "JetBrains Mono","IBM Plex Mono",monospace`;

      for(let si=0;si<segs.length;si++){
        const seg=segs[si];
        const txt=seg.t;
        if(li<(isMobile?3:6)){
          for(let c=0;c<txt.length&&xOff<cW-4;c++){
            const ch=txt[c];
            const cs=Math.sin((r*txt.length+c)*91.7+li*17.3)*43758.5453;
            const cv2=0.6+Math.abs(cs-Math.floor(cs))*0.8;
            const charAlpha=Math.min(baseAlpha*cv2,1.0);
            const isDim='.:=[]{}()<>/|\\─│ '.includes(ch);
            ctx.fillStyle=`rgba(255,255,255,${Math.min(isDim?charAlpha*0.5:charAlpha,1).toFixed(3)})`;
            ctx.fillText(ch,xOff,y0+2);
            xOff+=charW;
          }
        } else {
          ctx.fillStyle=`rgba(255,255,255,${Math.min(baseAlpha,1).toFixed(3)})`;
          ctx.fillText(txt.substring(0,cfg.cols),xOff,y0+2);
          xOff+=txt.length*charW;
        }
        if(si<segs.length-1){
          ctx.fillStyle=`rgba(255,255,255,${(baseAlpha*0.15).toFixed(3)})`;
          ctx.fillText(' │ ',xOff,y0+2);
          xOff+=charW*3;
        }
      }
    }
  }

  renderRows(0,totalRows,0);

  const wrap=document.createElement('div');
  wrap.className='layer';
  wrap.style.cssText=`width:${cW}px;height:${cH}px;margin-left:${-cW/2}px;margin-top:${-cH/2}px;
    transform:translate3d(${cfg.x}px,${cfg.y}px,${cfg.z}px) rotateY(${cfg.rY}deg) rotateX(${cfg.rX}deg) rotateZ(${cfg.rZ}deg);
    opacity:${cfg.op};will-change:transform;`;
  wrap.appendChild(cv);
  pivot.appendChild(wrap);

  layers.push({cfg,cv,ctx,wrap,cW,cH,lineH,charW,totalRows,renderRows,
    scrollY:Math.random()*cH*0.25,lastRefresh:0,burstEnergy:0});
});

// ═══════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════
let prev=performance.now()/1000;
const basePerspOriginX=isPortrait?50:60;
const basePerspOriginY=isPortrait?40:48;

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now()/1000;
  const dt=Math.min(now-prev,0.05);
  prev=now;

  mouse.vx=mouse.px-mouse.prevX;mouse.vy=mouse.py-mouse.prevY;
  mouse.prevX=mouse.px;mouse.prevY=mouse.py;
  const mouseSpeed=Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy);

  mouse.sx+=(mouse.x-mouse.sx)*0.04;
  mouse.sy+=(mouse.y-mouse.sy)*0.04;

  dragRotX+=(targetDragRotX-dragRotX)*0.06;
  dragRotY+=(targetDragRotY-dragRotY)*0.06;
  if(!mouse.down){targetDragRotX*=0.995;targetDragRotY*=0.995}

  globalBurst*=0.92;

  const zoomZ=zoomLevel*80*scaleAvg;

  scene.style.perspectiveOrigin=`${basePerspOriginX+mouse.sx*7+dragRotY*0.3}% ${basePerspOriginY+mouse.sy*5+dragRotX*0.3}%`;

  pivot.style.transform=`translate3d(0,0,${zoomZ}px) rotateX(${dragRotX}deg) rotateY(${dragRotY}deg)`;

  if(!isMobile){
    const lightSize=Math.round(400*scaleAvg+mouseSpeed*6);
    const lightAlpha=0.04+mouseSpeed*0.001;
    cl.style.left=mouse.px+'px';cl.style.top=mouse.py+'px';
    cl.style.width=lightSize+'px';cl.style.height=lightSize+'px';
    cl.style.background=`radial-gradient(circle,rgba(255,255,255,${Math.min(lightAlpha,0.12).toFixed(3)}) 0%,transparent 70%)`;
  }

  const velSpeedBoost=1+mouseSpeed*0.004;

  layers.forEach((lo,i)=>{
    const effectiveSpeed=lo.cfg.spd*speedMultiplier*velSpeedBoost*(1+globalBurst*2)*(1+lo.burstEnergy*3);
    lo.scrollY+=effectiveSpeed*dt;
    const halfH=lo.cH/2;
    if(lo.scrollY>=halfH) lo.scrollY-=halfH;
    lo.cv.style.transform=`translateY(${-lo.scrollY}px)`;

    const mx=mouse.sx*(14+i*6)*scaleAvg;
    const my=mouse.sy*(7+i*3)*scaleAvg;
    const bx=Math.sin(now*0.12+i*0.75)*3*scaleAvg;
    const by=Math.cos(now*0.09+i*0.55)*2*scaleAvg;
    const bz=Math.sin(now*0.07+i*1.1)*5*scaleAvg;

    lo.wrap.style.transform=`
      translate3d(${lo.cfg.x+mx+bx}px,${lo.cfg.y+my+by}px,${lo.cfg.z+bz}px)
      rotateY(${lo.cfg.rY+mouse.sx*2.5}deg)
      rotateX(${lo.cfg.rX+mouse.sy*1.8}deg)
      rotateZ(${lo.cfg.rZ+Math.sin(now*0.04+i)*0.25}deg)
    `;

    lo.burstEnergy*=0.9;

    lo.lastRefresh+=dt*(1+globalBurst*5+lo.burstEnergy*8);
    if(lo.lastRefresh>0.5+i*0.2){
      lo.lastRefresh=0;
      const startRow=Math.random()*(lo.totalRows-15)|0;
      const count=2+(Math.random()*(8+globalBurst*15)|0);
      lo.renderRows(startRow,startRow+count,globalBurst*0.4+lo.burstEnergy*0.5);
    }
  });

  for(let ri=ripples.length-1;ri>=0;ri--){
    const r=ripples[ri];
    r.age+=dt;r.size+=r.speed*dt;
    const progress=r.size/r.maxSize;
    if(progress>=1){r.el.remove();ripples.splice(ri,1)}
    else{
      r.el.style.width=r.size+'px';r.el.style.height=r.size+'px';
      r.el.style.left=(r.x-r.size/2)+'px';r.el.style.top=(r.y-r.size/2)+'px';
      r.el.style.borderColor=`rgba(255,255,255,${(r.alpha*(1-progress)).toFixed(3)})`;
    }
  }
}
animate();

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/W)*2-1;mouse.y=-(e.clientY/H)*2+1;mouse.px=e.clientX;mouse.py=e.clientY;
  if(mouse.down){
    targetDragRotY=Math.max(-40,Math.min(40,mouse.dragRotY+(e.clientX-mouse.dragStartX)*0.15));
    targetDragRotX=Math.max(-25,Math.min(25,mouse.dragRotX-(e.clientY-mouse.dragStartY)*0.1));
  }
});

window.addEventListener('mousedown',e=>{
  if(e.button===0){mouse.down=true;mouse.dragStartX=e.clientX;mouse.dragStartY=e.clientY;mouse.dragRotX=dragRotX;mouse.dragRotY=dragRotY}
});

window.addEventListener('mouseup',e=>{
  if(e.button===0){
    if(Math.abs(e.clientX-mouse.dragStartX)<5&&Math.abs(e.clientY-mouse.dragStartY)<5){
      spawnRipple(e.clientX,e.clientY);globalBurst=1;
      layers.forEach((lo,i)=>{setTimeout(()=>{lo.burstEnergy=1-i*0.06},i*60)});
    }
    mouse.down=false;
  }
});

window.addEventListener('wheel',e=>{e.preventDefault();zoomLevel=Math.max(-6,Math.min(6,zoomLevel+(e.deltaY>0?-0.4:0.4)))},{passive:false});

window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();globalBurst=1.5;layers.forEach((lo,i)=>{setTimeout(()=>{lo.burstEnergy=1.2},i*40)});spawnRipple(W/2,H/2)}
  if(e.code==='Enter'){speedMultiplier=speedMultiplier===1?3:speedMultiplier===3?0.2:1}
  if(e.code==='ArrowLeft') targetDragRotY=Math.max(-40,targetDragRotY-3);
  if(e.code==='ArrowRight')targetDragRotY=Math.min(40,targetDragRotY+3);
  if(e.code==='ArrowUp')   targetDragRotX=Math.max(-25,targetDragRotX+2);
  if(e.code==='ArrowDown') targetDragRotX=Math.min(25,targetDragRotX-2);
  if(e.code==='KeyR'){targetDragRotX=0;targetDragRotY=0;zoomLevel=0;speedMultiplier=1}
});

// Touch
let tStartX=0,tStartY=0,tDragRX=0,tDragRY=0;
window.addEventListener('touchstart',e=>{
  const t=e.touches[0];tStartX=t.clientX;tStartY=t.clientY;tDragRX=dragRotX;tDragRY=dragRotY;
  mouse.px=t.clientX;mouse.py=t.clientY;mouse.x=(t.clientX/W)*2-1;mouse.y=-(t.clientY/H)*2+1;
},{passive:true});

window.addEventListener('touchmove',e=>{
  const t=e.touches[0];mouse.x=(t.clientX/W)*2-1;mouse.y=-(t.clientY/H)*2+1;mouse.px=t.clientX;mouse.py=t.clientY;
  if(e.touches.length===1){
    targetDragRotY=Math.max(-40,Math.min(40,tDragRY+(t.clientX-tStartX)*0.15));
    targetDragRotX=Math.max(-25,Math.min(25,tDragRX-(t.clientY-tStartY)*0.1));
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(!window._lp)window._lp=d;zoomLevel=Math.max(-6,Math.min(6,zoomLevel+(d-window._lp)*0.02));window._lp=d;
  }
},{passive:true});

window.addEventListener('touchend',e=>{
  window._lp=null;
  if(e.changedTouches.length){
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-tStartX)<10&&Math.abs(t.clientY-tStartY)<10){
      spawnRipple(t.clientX,t.clientY);globalBurst=1;
      layers.forEach((lo,i)=>{setTimeout(()=>{lo.burstEnergy=1-i*0.06},i*60)});
    }
  }
},{passive:true});

window.addEventListener('resize',()=>location.reload());
</script>
